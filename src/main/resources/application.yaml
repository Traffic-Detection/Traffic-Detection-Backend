spring:
  datasource:
    url: jdbc:mysql://localhost:3306/traffic_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: 12345

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 86400000

logging:
  level:
    org:
      springframework:
        boot:
          context:
            config=DEBUG: debug