spring:
  datasource:
    url: ${DB_URL}
    username: root
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 86400000

logging:
  level:
    org:
      springframework:
        boot:
          context:
            config=DEBUG: debug