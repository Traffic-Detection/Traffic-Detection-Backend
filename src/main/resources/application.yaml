spring:
  datasource:
    url: ${DB_URL}
    username: root
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 86400000

r2:
  endpoint: ${R2_ENDPOINT:}
  access-key: ${R2_ACCESS_KEY:}
  secret-key: ${R2_SECRET_KEY:}
  bucket-name: ${R2_BUCKET_NAME:}
  public-base-url: ${R2_PUBLIC_BASE_URL:}

logging:
  level:
    org:
      springframework:
        boot:
          context:
            config=DEBUG: debug