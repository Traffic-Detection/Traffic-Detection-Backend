databaseChangeLog:
  - changeSet:
      id: 008-create-refresh-token
      author: huy

      changes:

        - createTable:
            tableName: refresh_tokens
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: token
                  type: VARCHAR(500)
                  constraints:
                    nullable: false

              - column:
                  name: expiry_date
                  type: DATETIME
                  constraints:
                    nullable: false

              - column:
                  name: revoked
                  type: BIT(1)
                  defaultValueNumeric: 0

        - addForeignKeyConstraint:
            constraintName: fk_refresh_token_user
            baseTableName: refresh_tokens
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id