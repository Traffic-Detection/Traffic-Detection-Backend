databaseChangeLog:
  - changeSet:
      id: 003-create-intersections
      author: huy

      changes:

        - createTable:
            tableName: intersections
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: operating_mode
                  type: VARCHAR(30)
                  constraints:
                    nullable: false

              - column:
                  name: created_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP