databaseChangeLog:
  - changeSet:
      id: 004-create-lanes
      author: huy

      changes:

        - createTable:
            tableName: lanes
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: intersection_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: direction_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false

              - column:
                  name: opposing_lane_id
                  type: BIGINT

        - addForeignKeyConstraint:
            constraintName: fk_lane_intersection
            baseTableName: lanes
            baseColumnNames: intersection_id
            referencedTableName: intersections
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_opposing_lane
            baseTableName: lanes
            baseColumnNames: opposing_lane_id
            referencedTableName: lanes
            referencedColumnNames: id