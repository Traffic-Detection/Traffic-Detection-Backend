databaseChangeLog:
  - changeSet:
      id: 007-create-signal-histories
      author: huy

      changes:

        - createTable:
            tableName: signal_histories
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: intersection_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: lane_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: green_duration
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: red_duration
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: applied_at
                  type: DATETIME
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addForeignKeyConstraint:
            constraintName: fk_signal_intersection
            baseTableName: signal_histories
            baseColumnNames: intersection_id
            referencedTableName: intersections
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_signal_lane
            baseTableName: signal_histories
            baseColumnNames: lane_id
            referencedTableName: lanes
            referencedColumnNames: id