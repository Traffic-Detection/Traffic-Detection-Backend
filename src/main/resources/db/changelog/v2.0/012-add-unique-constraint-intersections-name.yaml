databaseChangeLog:
  - changeSet:
      id: 012-add-unique-constraint-intersections-name
      author: huy

      preConditions:
        onFail: MARK_RAN
          - sqlCheck:
              expectedResult: 0
              sql: |
                SELECT COUNT(*)
                FROM (
                  SELECT name
                  FROM intersections
                  GROUP BY name
                  HAVING COUNT(*) > 1
                ) t

      changes:
        - addUniqueConstraint:
            tableName: intersections
            columnNames: name
            constraintName: uk_intersections_name