databaseChangeLog:
  - changeSet:
      id: 010-add-unique-constraint-intersections-name
      author: huy
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - sqlCheck:
            expectedResult: "0"
            sql: |
              SELECT COUNT(*)
              FROM (
                SELECT name
                FROM intersections
                GROUP BY name
                HAVING COUNT(*) > 1
              ) t
      changes:
        - addUniqueConstraint:
            tableName: intersections
            columnNames: name
            constraintName: uk_intersections_name
