              -- 1. BẢNG users
              INSERT INTO `users` (`id`, `username`, `password`, `email`, `full_name`, `role_id`, `enabled`, `created_at`, `updated_at`) VALUES 
              (1, 'admin', '$2a$12$DbGH5.cvHBfYyOIxeGdTdugaK.e.NDp295sr0dSKGM8SGuPx.1Rt.', 'admin@traffic.local', 'Quản Trị Viên', 1, 1, '2026-06-30 20:59:52', '2026-06-30 20:59:52'),
